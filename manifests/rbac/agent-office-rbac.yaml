apiVersion: v1
kind: Namespace
metadata:
  name: agent-office
  labels:
    app.kubernetes.io/name: agent-office
    app.kubernetes.io/part-of: agent-office
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-office
  namespace: agent-office
  labels:
    app.kubernetes.io/name: agent-office
    app.kubernetes.io/part-of: agent-office
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-office
  labels:
    app.kubernetes.io/name: agent-office
    app.kubernetes.io/part-of: agent-office
rules:
  # Core resources — full CRUD
  - apiGroups: [""]
    resources:
      - pods
      - pods/exec
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - namespaces
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments — full CRUD
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # AgentWorkstation CRD — full CRUD
  - apiGroups: ["agentoffice.ai"]
    resources:
      - agentworkstations
      - agentworkstations/status
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # SmallModelRouter — read-only (discover available routers)
  - apiGroups: ["ai.redhat.com"]
    resources:
      - smallmodelrouters
    verbs: ["get", "list", "watch"]
  # OpenShift Routes — full CRUD
  - apiGroups: ["route.openshift.io"]
    resources:
      - routes
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Argo CD applications/projects — manage per-agent GitOps lifecycle
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
      - appprojects
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-office
  labels:
    app.kubernetes.io/name: agent-office
    app.kubernetes.io/part-of: agent-office
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-office
subjects:
  - kind: ServiceAccount
    name: agent-office
    namespace: agent-office
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-office-shared-skills
  namespace: agent-office
  labels:
    app.kubernetes.io/name: agent-office-shared-skills
    app.kubernetes.io/part-of: agent-office
data:
  SKILL_developer-hub.md: |
    ---
    name: developer-hub
    description: Use Red Hat Developer Hub from inside this cluster. This skill is the source of truth for RHDH endpoints, auth flow, catalog APIs, and scaffolder APIs.
    metadata: { "openclaw": { "emoji": "🧭" } }
    ---

    # Developer Hub Skill

    Use this skill for any task involving Red Hat Developer Hub, Backstage, the software catalog, scaffolder templates, scaffolder task execution, or component registration.

    ## Canonical Endpoints

    - In-cluster API base: `http://v1-developer-hub.rhdh-test.svc.cluster.local:7007`
    - Public route: `https://v1-developer-hub-rhdh-test.apps.salamander.aimlworkbench.com`
    - Namespace: `rhdh-test`
    - Service: `v1-developer-hub`
    - Deployment: `v1-developer-hub`

    ## Rules

    - Prefer the in-cluster API base for agent-to-service calls made from inside OpenShift.
    - Use the public route only when you need a browser-visible URL.
    - Never guess alternate hostnames like `backstage-developer-hub-*`.
    - Before declaring Developer Hub unavailable, verify the real deployment and pods:
      - `oc get deploy -n rhdh-test v1-developer-hub`
      - `oc get pods -n rhdh-test`

    ## Auth

    - If `RHDH_TOKEN` is present in the environment, use it first as `Authorization: Bearer ${RHDH_TOKEN}` for catalog and scaffolder API calls.
    - Only fall back to `POST /api/auth/guest/refresh` when `RHDH_TOKEN` is absent.
    - Do not start an interactive GitHub or browser auth flow when `RHDH_TOKEN` is available.
    - Use the resulting bearer token for subsequent catalog and scaffolder API calls.

    ## Common API Paths

    - Guest auth: `POST ${BASE}/api/auth/guest/refresh`
    - Catalog entities: `GET ${BASE}/api/catalog/entities`
    - Templates only: `GET ${BASE}/api/catalog/entities?filter=kind=template`
    - Scaffolder task create: `POST ${BASE}/api/scaffolder/v2/tasks`
    - Scaffolder task events: `GET ${BASE}/api/scaffolder/v2/tasks/<taskId>/events`

    ## Default Workflow

    1. Use the in-cluster base URL.
    2. Verify `v1-developer-hub` is healthy before reporting an outage.
    3. Authenticate.
    4. Find the target template in the catalog.
    5. Create the scaffolder task.
    6. Watch task events until success or failure.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-office-server
  namespace: agent-office
  labels:
    app.kubernetes.io/name: agent-office-server
    app.kubernetes.io/part-of: agent-office
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-office-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-office-server
        app.kubernetes.io/part-of: agent-office
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: agent-office
      containers:
        - name: server
          image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-server:0.1.30
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RHDH_URL
              value: "http://v1-developer-hub.rhdh-test.svc.cluster.local:7007"
            - name: RHDH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-office-rhdh
                  key: token
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
